version: '3.8'

services:
  app:
    image: spring-thymeleaf-app 
    container_name: spring-thymeleaf-app
    ports:
      - "8082:8080"    
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:stagingdb
      - SPRING_H2_CONSOLE_ENABLED=true
    restart: unless-stopped